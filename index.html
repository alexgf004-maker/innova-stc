<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INNOVA STC</title>
  <meta name="application-name" content="INNOVA STC"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="INNOVA"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#1B4F8A"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            accent:  '#06b6d4',
            success: '#2E7D32',
            danger:  '#C62828',
            surface: '#F5F7FA',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-sans text-gray-900">

  <div id="app-shell" class="flex h-screen overflow-hidden opacity-0 transition-opacity duration-300" style="background:#0d0d0d">

    <!-- ── SIDEBAR (desktop) ── -->
    <aside id="sidebar" class="hidden md:flex flex-col w-60 bg-primary text-white shrink-0 overflow-y-auto">

      <!-- Logo -->
      <div class="px-5 py-5 border-b border-white/10">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center shrink-0">
            <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
              <path d="M4 8h6v16H4zM13 8h6l6 16h-6z" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="min-w-0">
            <p class="font-bold text-sm leading-tight">INNOVA</p>
            <p class="text-white/50 text-xs truncate">Servicios Técnicos</p>
          </div>
        </div>
      </div>

      <!-- Navegación -->
      <nav id="sidebar-nav" class="flex-1 py-3 px-2 space-y-0.5">
        <!-- Generado por router.js -->
      </nav>

      <!-- Footer del sidebar -->
      <div class="px-4 py-4 border-t border-white/10">
        <p id="sidebar-username" class="text-white/60 text-xs mb-1 truncate"></p>
        <p id="sidebar-role" class="text-white/40 text-xs mb-3 capitalize"></p>
        <button id="btn-logout-sidebar"
          class="flex items-center gap-2 text-white/50 hover:text-white text-xs transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
          Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- ── ÁREA PRINCIPAL ── -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

      <!-- Topbar -->
      <header id="topbar" class="h-14 flex items-center px-4 shrink-0 z-10 gap-3" style="background:#111;border-bottom:1px solid #1e1e1e">
        <div class="flex items-center gap-2 flex-1">
          <div class="w-7 h-7 rounded flex items-center justify-center md:hidden" style="background-color:#1B4F8A">
            <svg width="14" height="14" viewBox="0 0 32 32" fill="none">
              <path d="M4 8h6v16H4zM13 8h6l6 16h-6z" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="font-semibold text-sm text-gray-900 md:hidden">INNOVA STC</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <div class="text-right hidden sm:block">
            <p id="topbar-name" class="text-sm font-medium leading-tight" style="color:white"></p>
            <p id="topbar-role" class="text-xs capitalize" style="color:rgba(255,255,255,.3)"></p>
          </div>
          <!-- Avatar -->
          <div class="relative">
            <button id="topbar-avatar"
              class="w-9 h-9 rounded-full text-white text-xs font-bold flex items-center justify-center shrink-0 cursor-pointer hover:opacity-80 transition-opacity"
              style="background-color:#1B4F8A;">
            </button>
            <div id="avatar-menu" class="hidden absolute right-0 top-10 rounded-xl py-1 z-50 w-44" style="background:#1a1a1a;border:1px solid #2a2a2a;box-shadow:0 16px 40px rgba(0,0,0,.6)">
              <div id="avatar-menu-name" class="px-4 py-2 text-xs truncate" style="color:rgba(255,255,255,.25);border-bottom:1px solid #2a2a2a"></div>
              <button id="btn-logout-menu" class="w-full text-left px-4 py-2.5 text-sm flex items-center gap-2" style="color:#f87171;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
                Cerrar sesión
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Contenido principal -->
      <main id="content-area" class="flex-1 overflow-y-auto p-4 pb-20 md:pb-6">
        <!-- Las vistas se inyectan aquí por router.js -->
        <div class="flex items-center justify-center h-full">
          <div class="flex items-center gap-3 text-gray-400 text-sm">
            <svg class="animate-spin w-5 h-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            Cargando...
          </div>
        </div>
      </main>
    </div>

    <!-- ── BOTTOM NAV (móvil) ── -->
    <nav id="bottom-nav"
      class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center px-2 py-1 z-50 safe-area-bottom">
      <!-- Generado por router.js -->
    </nav>

  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- Firebase CDN -->
  <script type="module">
    import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { FIREBASE_CONFIG } from './js/firebase-config.js';
    import { initRouter }      from './js/router.js';
    import { initUI, showToast } from './js/ui.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Exponer instancias globalmente para los módulos
    window.__firebase = { app, auth, db };

    // Verificar sesión
    const sessionRaw = localStorage.getItem('innova_session');
    if (!sessionRaw) {
      window.location.href = 'login.html';
    } else {
      const session = JSON.parse(sessionRaw);
      if (!session.pinVerified) {
        window.location.href = 'login.html';
      } else {
        window.__session = session;
        initApp(session);
      }
    }

    function initApp(session) {
      // Poblar datos del usuario en UI
      document.getElementById('sidebar-username').textContent = session.displayName;
      document.getElementById('sidebar-role').textContent     = session.role;
      document.getElementById('topbar-name').textContent      = session.displayName;
      document.getElementById('topbar-role').textContent      = session.role;
      document.getElementById('topbar-avatar').textContent    =
        session.displayName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

      // Inicializar UI helpers y router
      initUI();
      initRouter(session);

      // Mostrar shell
      const shell = document.getElementById('app-shell');
      shell.classList.remove('opacity-0');

      // Logout
      async function handleLogout() {
        try {
          await signOut(auth);
        } catch (_) {}
        localStorage.removeItem('innova_session');
        window.location.href = 'login.html';
      }

      document.getElementById('btn-logout-sidebar').addEventListener('click', handleLogout);
      document.getElementById('btn-logout-mobile')?.addEventListener('click', handleLogout);

      const avatar        = document.getElementById('topbar-avatar');
      const avatarMenu    = document.getElementById('avatar-menu');
      const avatarMenuName = document.getElementById('avatar-menu-name');

      avatarMenuName.textContent = session.displayName;

      avatar.addEventListener('click', (e) => {
        e.stopPropagation();
        avatarMenu.classList.toggle('hidden');
      });

      document.addEventListener('click', (e) => {
        if (!avatarMenu.contains(e.target)) {
          avatarMenu.classList.add('hidden');
        }
      });

      document.getElementById('btn-logout-menu').addEventListener('click', handleLogout);

      // Verificar que Firebase Auth sigue activo
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          localStorage.removeItem('innova_session');
          window.location.href = 'login.html';
        }
      });
    }
  </script>

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/innova-stc/sw.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW error:', err); });
      });
    }

    // PWA Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      // Show install button
      const btn = document.getElementById('btn-install-pwa');
      if (btn) btn.style.display = 'flex';
    });

    window.addEventListener('appinstalled', function() {
      const btn = document.getElementById('btn-install-pwa');
      if (btn) btn.style.display = 'none';
      deferredPrompt = null;
    });

    window.__installPWA = function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
    };
  </script>
</body>
</html>
