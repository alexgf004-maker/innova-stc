<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INNOVA STC — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1f3d;
      position: relative;
      overflow: hidden;
    }

    .bg-blob-top {
      position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.2) 0%, transparent 65%);
      pointer-events: none;
    }
    .bg-blob-bottom {
      position: fixed; bottom: -100px; right: -80px;
      width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(27,79,138,.15) 0%, transparent 65%);
      pointer-events: none;
    }
    

    .screen {
      flex: 1; display: flex; flex-direction: column;
      padding: 48px 32px 32px;
      max-width: 400px; width: 100%; margin: 0 auto;
      position: relative; z-index: 1;
    }

    .brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 56px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 800;
      color: white; letter-spacing: .04em; line-height: 1;
    }
    .brand-sub {
      font-size: 10px; font-weight: 300; color: rgba(255,255,255,.35);
      letter-spacing: .1em; margin-top: 3px;
    }

    .content { flex: 1; display: flex; flex-direction: column; justify-content: center; }

    .section-label {
      font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.3);
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .section-label::after {
      content: ''; height: 1px; width: 32px; background: rgba(255,255,255,.15);
    }

    .main-title {
      font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 900;
      color: white; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 10px;
    }
    .main-title .accent { color: #60a5fa; }

    .main-sub {
      font-size: 13px; font-weight: 300; color: rgba(255,255,255,.35);
      margin-bottom: 40px; line-height: 1.5;
    }

    .fields { display: flex; flex-direction: column; gap: 14px; }

    .field-label {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 6px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px; padding: 14px 18px;
      font-size: 16px; font-family: 'DM Sans', sans-serif;
      color: white; outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    input::placeholder { color: rgba(255,255,255,.18); }
    input:focus {
      border-color: rgba(96,165,250,.5);
      background: rgba(255,255,255,.1);
      box-shadow: 0 0 0 3px rgba(96,165,250,.1);
    }

    #input-pin {
      text-align: center; font-size: 24px; letter-spacing: .4em;
      font-family: 'IBM Plex Mono', monospace; font-weight: 500;
    }

    .error-box {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #fca5a5;
      display: none;
    }

    .bottom {
      display: flex; align-items: center; justify-content: flex-end;
      padding-top: 32px;
    }

    .btn-submit {
      display: flex; align-items: center; gap: 10px;
      background: white; border: none; border-radius: 14px; padding: 14px 26px;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700;
      color: #0f1f3d; cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
      transition: all .15s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 12px 36px rgba(0,0,0,.4); }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .loading-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,.1);
      border-top-color: rgba(255,255,255,.6);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap p { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.3); letter-spacing: .05em; }

    .footer {
      text-align: center; padding: 20px 0 16px;
      font-size: 10px; font-weight: 300; color: rgba(255,255,255,.12);
      letter-spacing: .1em; text-transform: uppercase;
      position: relative; z-index: 1;
    }

    .hidden { display: none !important; }

    
      .screen { max-width: 480px; padding: 64px 56px; justify-content: center; }
      .brand { margin-bottom: 64px; }
      
      
      
      
      
      
      
      .footer { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg-blob-top"></div>
  <div class="bg-blob-bottom"></div>
  

  <div class="screen">
    <div class="brand">
      <div class="brand-icon">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
          <path d="M4 8h6v16H4zM13 8h6l6 16h-6zM19 8h6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">INNOVA STC</div>
        <div class="brand-sub">Servicios Técnicos y Comerciales</div>
      </div>
    </div>

    <div id="step-form" class="content">
      <div class="section-label">Acceso al sistema</div>
      <div class="main-title">Hola,<br><span class="accent">bienvenido.</span></div>
      <div class="main-sub">Ingresa tus credenciales para continuar</div>
      <div class="fields">
        <div>
          <div class="field-label">Usuario</div>
          <input id="input-username" type="text" placeholder="nombre.apellido"
            autocapitalize="none" spellcheck="false" autocomplete="username"/>
        </div>
        <div>
          <div class="field-label">PIN</div>
          <input id="input-pin" type="password" inputmode="numeric" maxlength="8" placeholder="••••"/>
        </div>
        <div id="error-box" class="error-box"></div>
      </div>
      <div class="bottom">
        <button id="btn-submit" class="btn-submit">
          Entrar
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>

    <div id="step-loading" class="content hidden">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>Verificando acceso...</p>
      </div>
    </div>

    <div class="footer">Uso interno</div>
  </div>

  <script type="module">
    import { initializeApp }               from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { FIREBASE_CONFIG, SEED } from './js/firebase-config.js';
    import { hashPin, derivePassword } from './js/crypto.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const stepForm    = document.getElementById('step-form');
    const stepLoading = document.getElementById('step-loading');
    const inputUser   = document.getElementById('input-username');
    const inputPin    = document.getElementById('input-pin');
    const btnSubmit   = document.getElementById('btn-submit');
    const errorBox    = document.getElementById('error-box');

    function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
    function hideError()    { errorBox.style.display = 'none'; }
    function showLoading()  { stepForm.classList.add('hidden'); stepLoading.classList.remove('hidden'); }
    function showForm()     { stepForm.classList.remove('hidden'); stepLoading.classList.add('hidden'); }

    async function handleSubmit() {
      const username = inputUser.value.trim().toLowerCase();
      const pinVal   = inputPin.value.replace(/\D/g, '');
      if (!username) { inputUser.focus(); return; }
      if (pinVal.length < 4) { inputPin.focus(); return; }
      hideError(); btnSubmit.disabled = true; showLoading();
      try {
        const q    = query(collection(db, 'users'), where('username', '==', username));
        const snap = await getDocs(q);
        if (snap.empty) { showForm(); showError('Usuario no encontrado.'); btnSubmit.disabled = false; return; }
        const data = snap.docs[0].data();
        if (!data.active) { showForm(); showError('Usuario inactivo. Contacta al administrador.'); btnSubmit.disabled = false; return; }
        const internalPass = await derivePassword(data.uid, SEED);
        await signInWithEmailAndPassword(auth, data.internalEmail, internalPass);
        const profileSnap = await getDoc(doc(db, 'users', data.uid));
        if (!profileSnap.exists()) throw new Error();
        const profile = profileSnap.data();
        const computed = await hashPin(profile.pinSalt, pinVal);
        if (computed !== profile.pinHash) {
          await signOut(auth); inputPin.value = '';
          showForm(); showError('PIN incorrecto.'); btnSubmit.disabled = false; inputPin.focus(); return;
        }
        localStorage.setItem('innova_session', JSON.stringify({
          uid: profile.uid, username: profile.username, displayName: profile.displayName,
          role: profile.role, asignacionActual: profile.asignacionActual || null,
          usuarioOperativoAsignado: profile.usuarioOperativoAsignado || null, pinVerified: true,
        }));
        window.location.href = 'index.html';
      } catch(err) {
        await signOut(auth).catch(() => {}); inputPin.value = '';
        showForm(); showError('Error de autenticación. Intenta de nuevo.'); btnSubmit.disabled = false; console.error(err);
      }
    }

    btnSubmit.addEventListener('click', handleSubmit);
    inputUser.addEventListener('keydown', e => { if (e.key === 'Enter') inputPin.focus(); });
    inputPin.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
    inputPin.addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g,'').slice(0,8); });
    if (localStorage.getItem('innova_session')) window.location.href = 'index.html';
    inputUser.focus();
  </script>

</body>
</html>
