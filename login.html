<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INNOVA STC — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0C0E12;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      overflow: hidden;
      position: relative;
    }

    /* Orbs de fondo */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(90px);
      opacity: 1;
    }
    .orb-1 {
      width: 560px; height: 560px;
      top: -20%; left: -15%;
      background: radial-gradient(circle, rgba(30,80,200,0.30) 0%, transparent 65%);
    }
    .orb-2 {
      width: 480px; height: 480px;
      bottom: -15%; right: -10%;
      background: radial-gradient(circle, rgba(30,80,200,0.22) 0%, transparent 65%);
    }
    .orb-3 {
      width: 320px; height: 320px;
      top: 55%; left: 55%;
      background: radial-gradient(circle, rgba(100,160,255,0.10) 0%, transparent 65%);
    }

    /* Card principal */
    .card {
      width: 100%;
      max-width: 368px;
      position: relative;
      z-index: 10;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(18, 21, 28, 0.72);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        0 32px 80px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.04) inset;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    /* Línea superior de acento */
    .card-accent-line {
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #1B4F8A 35%, #4A90E2 65%, transparent 100%);
    }

    /* Header del card */
    .card-header {
      padding: 2rem 2.25rem 1.75rem;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      border-radius: 16px;
      background: rgba(27,79,138,0.25);
      border: 1px solid rgba(74,144,226,0.25);
      margin-bottom: 1rem;
      box-shadow: 0 0 24px rgba(27,79,138,0.3);
    }

    .card-title {
      color: #F0F4FF;
      font-size: 1.125rem;
      font-weight: 800;
      letter-spacing: 0.12em;
    }
    .card-sub {
      color: rgba(255,255,255,0.28);
      font-size: 0.72rem;
      margin-top: 0.3rem;
      letter-spacing: 0.02em;
    }

    /* Body */
    .card-body { padding: 1.875rem 2.25rem 2.25rem; }

    .step-title {
      color: #E8EEFF;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .step-sub {
      color: rgba(255,255,255,0.28);
      font-size: 0.78rem;
      margin-bottom: 1.625rem;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.32);
      font-size: 0.68rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: #E8EEFF;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.16); }
    input:focus {
      border-color: rgba(74,144,226,0.6);
      background: rgba(27,79,138,0.12);
      box-shadow: 0 0 0 3px rgba(27,79,138,0.15);
    }

    #input-pin {
      text-align: center;
      font-size: 1.875rem;
      letter-spacing: 0.45em;
      font-family: 'IBM Plex Mono', monospace;
      padding: 0.9rem 1rem;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #1B4F8A 0%, #2563EB 100%);
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      cursor: pointer;
      margin-top: 1.125rem;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(27,79,138,0.4);
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .error-box {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.25);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      color: #FCA5A5;
      font-size: 0.78rem;
      margin-top: 0.75rem;
    }

    .back-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 0.2rem 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 1.375rem;
      transition: color 0.15s;
    }
    .back-btn:hover { color: rgba(255,255,255,0.65); }

    .spinner {
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #4A90E2;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-text {
      text-align: center;
      color: rgba(255,255,255,0.1);
      font-size: 0.68rem;
      margin-top: 1.5rem;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 10;
    }

    .space-y > * + * { margin-top: 0.9rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div style="width:100%;max-width:368px;position:relative;z-index:10;">
    <div class="card">
      <div class="card-accent-line"></div>

      <div class="card-header">
        <div class="logo-wrap">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M4 8h6v16H4zM13 8h6l6 16h-6zM19 8h6" stroke="#4A90E2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-title">INNOVA STC</div>
        <div class="card-sub">Servicios Técnicos y Comerciales</div>
      </div>

      <div class="card-body">

        <!-- Paso 1 -->
        <div id="step-username">
          <p class="step-title">Bienvenido</p>
          <p class="step-sub">Ingresa tu nombre de usuario para continuar</p>
          <div class="space-y">
            <div>
              <label>Usuario</label>
              <input id="input-username" type="text" autocomplete="username"
                autocapitalize="none" spellcheck="false" placeholder="ej. juan.perez"/>
            </div>
            <div id="error-username" class="error-box hidden"></div>
            <button id="btn-username" class="btn-primary">Continuar →</button>
          </div>
        </div>

        <!-- Paso 2 -->
        <div id="step-pin" class="hidden">
          <button id="btn-back" class="back-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Volver
          </button>
          <p class="step-title">Ingresa tu PIN</p>
          <p class="step-sub" id="pin-username-label"></p>
          <div class="space-y">
            <div>
              <label>PIN</label>
              <input id="input-pin" type="password" inputmode="numeric" maxlength="8" placeholder="••••"/>
            </div>
            <div id="error-pin" class="error-box hidden"></div>
            <button id="btn-pin" class="btn-primary">Entrar</button>
          </div>
        </div>

        <!-- Loading -->
        <div id="step-loading" class="hidden" style="text-align:center;padding:2rem 0;">
          <div class="spinner"></div>
          <p style="color:rgba(255,255,255,0.25);font-size:0.78rem;margin-top:0.875rem;letter-spacing:0.04em;">Verificando...</p>
        </div>

      </div>
    </div>
    <p class="footer-text">INNOVA STC &nbsp;·&nbsp; Uso interno</p>
  </div>

  <!-- Firebase CDN -->
  <script type="module">
    import { initializeApp }               from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { FIREBASE_CONFIG, SEED } from './js/firebase-config.js';
    import { hashPin, derivePassword } from './js/crypto.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;

    const stepUsername  = document.getElementById('step-username');
    const stepPin       = document.getElementById('step-pin');
    const stepLoading   = document.getElementById('step-loading');
    const inputUsername = document.getElementById('input-username');
    const inputPin      = document.getElementById('input-pin');
    const btnUsername   = document.getElementById('btn-username');
    const btnPin        = document.getElementById('btn-pin');
    const btnBack       = document.getElementById('btn-back');
    const errorUsername = document.getElementById('error-username');
    const errorPin      = document.getElementById('error-pin');
    const pinLabel      = document.getElementById('pin-username-label');

    function showStep(step) {
      [stepUsername, stepPin, stepLoading].forEach(s => s.classList.add('hidden'));
      step.classList.remove('hidden');
    }
    function showError(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
    function hideError(el) { el.classList.add('hidden'); }

    async function handleUsername() {
      const username = inputUsername.value.trim().toLowerCase();
      if (!username) return;
      hideError(errorUsername);
      btnUsername.disabled = true;
      showStep(stepLoading);
      try {
        const q    = query(collection(db, 'users'), where('username', '==', username));
        const snap = await getDocs(q);
        if (snap.empty) { showStep(stepUsername); showError(errorUsername, 'Usuario no encontrado.'); btnUsername.disabled = false; return; }
        const data = snap.docs[0].data();
        if (!data.active) { showStep(stepUsername); showError(errorUsername, 'Usuario inactivo. Contacta al administrador.'); btnUsername.disabled = false; return; }
        currentUser = { uid: data.uid, internalEmail: data.internalEmail, username: data.username };
        pinLabel.textContent = '@' + username;
        showStep(stepPin);
        inputPin.focus();
      } catch (err) {
        showStep(stepUsername);
        showError(errorUsername, 'Error al conectar. Intenta de nuevo.');
        btnUsername.disabled = false;
        console.error(err);
      }
    }

    async function handlePin() {
      const pinInput = inputPin.value.replace(/\D/g, '');
      if (pinInput.length < 4) return;
      hideError(errorPin);
      btnPin.disabled = true;
      showStep(stepLoading);
      try {
        const internalPass = await derivePassword(currentUser.uid, SEED);
        await signInWithEmailAndPassword(auth, currentUser.internalEmail, internalPass);
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        if (!snap.exists()) throw new Error('Perfil no encontrado.');
        const profile = snap.data();
        if (!profile.active) { await signOut(auth); showStep(stepPin); showError(errorPin, 'Usuario inactivo.'); btnPin.disabled = false; return; }
        const computed = await hashPin(profile.pinSalt, pinInput);
        if (computed !== profile.pinHash) {
          await signOut(auth);
          inputPin.value = '';
          showStep(stepPin);
          showError(errorPin, 'PIN incorrecto.');
          btnPin.disabled = false;
          return;
        }
        sessionStorage.setItem('innova_session', JSON.stringify({
          uid: profile.uid, username: profile.username, displayName: profile.displayName,
          role: profile.role, usuarioOperativoAsignado: profile.usuarioOperativoAsignado || null,
          pinVerified: true,
        }));
        window.location.href = 'index.html';
      } catch (err) {
        await signOut(auth).catch(() => {});
        inputPin.value = '';
        showStep(stepPin);
        showError(errorPin, 'Error de autenticación. Intenta de nuevo.');
        btnPin.disabled = false;
        console.error(err);
      }
    }

    btnUsername.addEventListener('click', handleUsername);
    inputUsername.addEventListener('keydown', e => { if (e.key === 'Enter') handleUsername(); });
    btnPin.addEventListener('click', handlePin);
    inputPin.addEventListener('keydown', e => { if (e.key === 'Enter') handlePin(); });
    inputPin.addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g, '').slice(0, 8); });
    btnBack.addEventListener('click', () => {
      currentUser = null;
      inputPin.value = '';
      hideError(errorPin);
      showStep(stepUsername);
      btnUsername.disabled = false;
      inputUsername.focus();
    });

    const existing = sessionStorage.getItem('innova_session');
    if (existing) window.location.href = 'index.html';
    inputUsername.focus();
  </script>



</body>
</html>
