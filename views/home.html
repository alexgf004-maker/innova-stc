<!-- views/home.html — Vista de inicio -->
<div class="space-y-6">

  <!-- Saludo -->
  <div>
    <h1 class="text-xl font-semibold text-gray-900" id="home-greeting">Bienvenido</h1>
    <p class="text-sm text-gray-500 mt-0.5">Panel de Servicios Técnicos y Comerciales</p>
  </div>

  <!-- Tarjetas de módulos disponibles -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="home-modules">
    <!-- Generadas por JS -->
  </div>

  <!-- Info del sistema -->
  <div class="bg-white rounded-xl border border-gray-200 p-4">
    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-3">Estado del sistema</p>
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-success inline-block"></span>
      <span class="text-sm text-gray-700">Sistema operativo</span>
    </div>
    <p class="text-xs text-gray-400 mt-2">INNOVA STC · Uso interno exclusivo</p>
  </div>

</div>

<script>
(function() {
  const session = window.__session;
  if (!session) return;

  // Saludo personalizado
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
  const greetEl = document.getElementById('home-greeting');
  if (greetEl) greetEl.textContent = `${greet}, ${session.displayName.split(' ')[0]}`;

  // Módulos según rol
  const modules = [
    {
      label: 'Kardex',
      desc:  'Control de materiales e inventario',
      path:  '/kardex',
      icon:  `<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
               <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>`,
      roles: ['admin', 'coordinadora', 'campo'],
      color: 'text-accent',
      bg:    'bg-accent/10',
    },
    {
      label: 'Usuarios',
      desc:  'Gestión de accesos y roles',
      path:  '/admin/usuarios',
      icon:  `<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
               <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>`,
      roles: ['admin'],
      color: 'text-primary',
      bg:    'bg-primary/10',
    },
  ];

  const grid = document.getElementById('home-modules');
  const visible = modules.filter(m => m.roles.includes(session.role));

  grid.innerHTML = visible.map(m => `
    <a data-route="${m.path}"
       class="bg-white rounded-xl border border-gray-200 p-5 hover:border-accent hover:shadow-sm transition-all cursor-pointer group">
      <div class="flex items-start gap-4">
        <div class="w-11 h-11 rounded-xl ${m.bg} flex items-center justify-center shrink-0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${m.color}">
            ${m.icon}
          </svg>
        </div>
        <div class="min-w-0">
          <p class="font-semibold text-gray-900 text-sm group-hover:text-accent transition-colors">${m.label}</p>
          <p class="text-xs text-gray-500 mt-0.5 leading-relaxed">${m.desc}</p>
        </div>
      </div>
    </a>
  `).join('');
})();
</script>
