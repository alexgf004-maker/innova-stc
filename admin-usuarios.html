<!-- views/admin-usuarios.html — Gestión de usuarios -->
<div class="space-y-4">

  <!-- Encabezado -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold text-gray-900">Usuarios</h1>
      <p class="text-sm text-gray-500 mt-0.5">Gestión de accesos y roles</p>
    </div>
    <button id="btn-new-user"
      class="inline-flex items-center gap-2 bg-primary hover:bg-accent text-white text-sm font-medium px-4 py-2.5 rounded-lg transition-colors">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nuevo
    </button>
  </div>

  <!-- Tabla de usuarios -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Usuario</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide hidden sm:table-cell">Rol</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Estado</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody id="user-list-container" class="divide-y divide-gray-100">
          <!-- Generado por admin.js -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Nota informativa -->
  <div class="flex items-start gap-2.5 bg-blue-50 border border-blue-100 rounded-xl p-4">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 mt-0.5">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p class="text-xs text-blue-700">
      Los usuarios desactivados no pueden iniciar sesión aunque sus credenciales sean correctas.
      El PIN nunca se almacena en texto plano.
    </p>
  </div>

</div>
